<!DOCTYPE html>
<html>
<head>
    <title>Найди пару</title>
    <style>
        body {
            background: #f0f0f0;
        }
        
        #board {
            display: grid;
            grid-template-columns: repeat(4, 80px);
            gap: 15px;
        }
        
        .card {
            width: 80px;
            height: 80px;
            background: var(--main-color);
            color: white;
            margin: 20px;
            font-size: 40px;
            cursor: pointer;
            border-radius: 8px;
        }
        
        .card.open {
            background: white;
            color: black;
        }
        
        .card.matched {
            background: #27ae60;
            color: white;
            border-color: #229954;
        }
    </style>
</head>
<body>
    <button id="startfinish">Start</button>
    <div id="timerbut"></div>
    <button id="chosecard1">first style</button>
    <button id="chosecard2">second style</button>
    <div><div id="board"></div></div>
    

    <script>
        const emojis = ['😀', '😎', '🐶', '🐱', '🍎', '⭐'];
        let cards = [];
        let open = [];
        let busy = false;
        let timer;
        let time;
        let ti = 60;
        let chose1 = '?'
        let chose2 = 'blue'
        const chosecard1 = document.getElementById('chosecard1')
        const chosecard2 = document.getElementById('chosecard2')
        let flag = 0;

        function start() {
            let deck = [...emojis, ...emojis];
            
            for (let i = deck.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                [deck[i], deck[j]] = [deck[j], deck[i]];
            }
            
            cards = deck.map((emoji, i) => ({
                id: i,
                emoji: emoji,
                show: false
            }));
            
            open = [];
            
            show();
        }

        function show() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            
            cards.forEach(card => {
                let div = document.createElement('div');
                div.className = 'card';
                if (card.show) div.classList.add('open');
                if (card.done) div.classList.add('matched');
                div.textContent = (card.show || card.done) ? card.emoji : `${chose1}`;
                div.onclick = () => click(card.id);
                board.appendChild(div);
            });
        }

        function click(id) {
            let card = cards.find(c => c.id === id);
            
            if (busy || card.show || card.done || open.length >= 2) return;
            
            card.show = true;
            open.push(card);
            show();
            
            if (open.length === 2) {
                let [a, b] = open;
                
                if (a.emoji === b.emoji) {
                    a.done = true;
                    b.done = true;
                    a.show = false;
                    b.show = false;
                    open = [];
                    show();
                } else {
                    busy = true;
                    timer = setTimeout(() => {
                        a.show = false;
                        b.show = false;
                        open = [];
                        busy = false;
                        show();
                    }, 700);
                    show();
                }
            }
        }

        
        
        const butStart = document.getElementById('startfinish')

        butStart.addEventListener('click', () => {
            console.log("Start")
            if(butStart.textContent == 'Start')
            {
                butStart.textContent = 'Finish';
                start();
            const bs = document.getElementById('timerbut')
            ti = 60;
            time = setInterval(() => {
                if(ti === 0)
                {
                    bs.textContent = `Вы проиграли`;
                }
                    bs.textContent = `Таймер ${ti}`;
                    ti--;
                }, 1000);
            }
            else
            {
                clearInterval(time);
                butStart.textContent = 'Start';
            }
            console.log("Start")
            })

        // let card = document.querySelector('.card')

        chosecard1.addEventListener('click', () => {
            if(flag == 0)
            {
                chose1 = '?'
                document.documentElement.style.setProperty('--main-color', 'blue');
                // card.setAttribute('style', 'background: blue;');
                flag++
            }
        })
        chosecard2.addEventListener('click', () => {
            if(flag == 0)
            {
                chose1 = '!'
                document.documentElement.style.setProperty('--main-color', 'red');
                // card.setAttribute('style', 'background: red;');
                flag++
            }
        })
    </script>
</body>
</html>
